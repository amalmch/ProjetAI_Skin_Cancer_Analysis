<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SkinGuard AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script>
        (function() {
            var saved = localStorage.getItem('skinguard-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>
<body class="login-body">

    <!-- Glowing Background Atmosphere -->
    <div class="bg-glow-container">
        <div class="bg-glow-orb orb-primary" style="opacity: 0.25; filter: blur(100px); width: 600px; height: 600px;"></div>
        <div class="bg-glow-orb orb-secondary" style="opacity: 0.25; filter: blur(100px); width: 500px; height: 500px;"></div>
    </div>

    <!-- Theme Toggle (top-right) -->
    <button class="theme-toggle-btn" id="themeToggleBtn" title="Basculer le thème" aria-label="Toggle dark/light mode" style="position: fixed; top: 24px; right: 24px; z-index: 100;">
        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <!-- Glassmorphic Login Block -->
    <div class="login-card glass-panel animate-up">
        <div class="login-logo">
            <!-- Large Heartbeat SVG -->
            <svg class="logo-heartbeat" width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="8" fill="url(#loginGrad)" />
                <path d="M7 16H11.5L13.5 10L16.5 22L18.5 14L20.5 16H25" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="loginGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#6366f1" />
                        <stop offset="1" stop-color="#06b6d4" />
                    </linearGradient>
                </defs>
            </svg>
            <h2>SkinGuard AI</h2>
            <p style="color: var(--text-secondary); font-size: 0.85rem; text-align: center; margin-top: -5px;">
                Portail Clinique Autorisés uniquement
            </p>
        </div>

        <!-- Notification Feed -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div style="margin-bottom: 20px;">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'danger' else 'danger' }}" style="padding: 10px 15px; font-size: 0.8rem;">
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Form Interface -->
        <form class="login-form" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Identifiant de session</label>
                <input class="form-input" type="text" id="username" name="username" placeholder="username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Mot de passe clinique</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px; width: 100%;">
                <span>Se connecter</span>
                <!-- Key SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                </svg>
            </button>
        </form>

        <div style="margin-top: 30px; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.75rem;">
                © 2026 SkinGuard Research. Tous droits réservés.
            </p>
        </div>
    </div>

    <!-- Theme Toggle Logic -->
    <script>
        (function() {
            const btn = document.getElementById('themeToggleBtn');
            if (!btn) return;
            btn.addEventListener('click', function() {
                const current = document.documentElement.getAttribute('data-theme') || 'dark';
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('skinguard-theme', next);
            });
        })();
    </script>

</body>
</html>
